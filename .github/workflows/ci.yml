name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Python and frontend quality
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: python -m pip install ".[api,dev]"

      - name: Run Python tests
        run: pytest -q

      - name: Lint Python
        run: ruff check .

      - name: Type-check Python
        run: mypy src

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Build frontend
        working-directory: web
        run: npm run build

      - name: Audit frontend dependencies
        working-directory: web
        run: npm audit --audit-level=high

  container:
    name: Docker smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build image
        run: docker build --tag dirty-product-linker:ci .

      - name: Start container
        run: docker run --detach --name dirty-product-linker-ci --publish 10000:10000 dirty-product-linker:ci

      - name: Wait for health endpoint
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:10000/health; then
              exit 0
            fi
            sleep 1
          done
          docker logs dirty-product-linker-ci
          exit 1

      - name: Stop container
        if: always()
        run: docker rm --force dirty-product-linker-ci
